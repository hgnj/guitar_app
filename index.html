<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d1017">
<title>Guitar Apps</title>
<style>
  :root{
    --bg:#0d1017; --panel:#171d29; --line:#2e3852;
    --txt:#eef2f9; --sub:#8a9ab5;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;}
  body{min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:24px env(safe-area-inset-right) 24px env(safe-area-inset-left);}
  .wrap{width:100%; max-width:560px; padding:0 20px;}
  h1{margin:0 0 26px; font-size:15px; font-weight:600; letter-spacing:.3em;
    color:var(--sub); text-align:center; text-transform:uppercase;}
  .apps{display:grid; gap:12px;}
  .app{display:flex; align-items:center; gap:16px; text-decoration:none; color:var(--txt);
    background:var(--panel); border:1px solid var(--line); border-radius:14px;
    padding:18px 22px; font-size:17px; font-weight:700; letter-spacing:.02em;
    transition:border-color .12s, background .12s;}
  .app:hover{border-color:#4a5a82; background:#1c2434;}
  .app .ico{font-size:24px; line-height:1; width:32px; text-align:center;}
  .app small{margin-left:auto; color:var(--sub); font-size:12px; font-weight:400;}
  @media(max-width:480px){
    .app{padding:16px 18px; font-size:16px;}
    .app small{display:none;}
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Guitar Apps</h1>
  <nav class="apps">
    <a class="app" href="tuner/index.html"><span class="ico">🎚</span>Tuner<small>チューナー / 音の分析</small></a>
    <a class="app" href="fretboard/index.html"><span class="ico">🎸</span>Fretboard<small>指板 / 理論 / 練習</small></a>
    <a class="app" href="studio/index.html"><span class="ico">🎹</span>Studio<small>伴奏 / ドラム</small></a>
    <a class="app" href="bookmark/index.html"><span class="ico">🔖</span>Bookmark<small>YouTube ループ</small></a>
  </nav>
</div>
</body>
</html>
